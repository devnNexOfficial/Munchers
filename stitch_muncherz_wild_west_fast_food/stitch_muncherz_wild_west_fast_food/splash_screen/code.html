<style>
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(2deg); }
        }
        @keyframes pulse-glow {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.05); }
        }
        @keyframes drift {
            0% { transform: translate(0, 0) scale(1); opacity: 0; }
            20% { opacity: 0.4; }
            100% { transform: translate(40px, -120px) scale(0.5); opacity: 0; }
        }
        .animate-float { animation: float 4s ease-in-out infinite; }
        .animate-pulse-glow { animation: pulse-glow 3s ease-in-out infinite; }
        
        .ember {
            position: absolute;
            background: #d72b2b;
            filter: blur(1px);
            border-radius: 50%;

<!-- Background Ambience Script -->
<script>
        function createEmber() {
            const container = document.getElementById('particle-container');
            const ember = document.createElement('div');
            
            // Random properties
            const size = Math.random() * 4 + 2;
            const startX = Math.random() * window.innerWidth;
            const startY = window.innerHeight + 10;
            const duration = Math.random() * 3 + 4;
            const delay = Math.random() * 5;
            
            ember.className = 'ember';
            ember.style.width = `${size}px`;
            ember.style.height = `${size}px`;
            ember.style.left = `${startX}px`;
            ember.style.top = `${startY}px`;
            
            // Random amber/red hue
            const colors = ['#d72b2b', '#f5c518', '#8b3a1a', '#ffb4ac'];
            ember.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            
            // Apply animation
            ember.style.animation = `drift ${duration}s linear ${delay}s infinite`;
            ember.style.boxShadow = `0 0 ${size * 2}px ${ember.style.backgroundColor}`;
            
            container.appendChild(ember);
            
            // Remove after animation to keep DOM clean if it wasn't infinite, 
            // but here we use a pool
            if (container.children.length > 50) {
                container.removeChild(container.firstChild);
            }
        }

        // Initialize particles
        for(let i = 0; i < 40; i++) {
            createEmber();
        }

        // Periodic maintenance or addition
        setInterval(() => {
            if (document.getElementById('particle-container').children.length < 60) {
                createEmber();
            }
        }, 300);

        // Keyframe injection for the progress bar
        const styleSheet = document.createElement("style");
        styleSheet.innerText = `
            @keyframes progress {
                0% { transform: translateX(-100%); }
                100% { transform: translateX(300%); }
            }
            .animate-in {
                animation: animateIn 1s ease-out forwards;
            }
            @keyframes animateIn {
                to { opacity: 1; transform: translateY(0); }
            }
        `;
        document.head.appendChild(styleSheet);
    </script>
