<script>
        // Screen Navigation Logic
        function navigateToOtp() {
            const phoneVal = document.getElementById('phone-input').value;
            if (phoneVal.length < 10) {
                alert('Please enter a valid number, partner.');
                return;
            }
            document.getElementById('display-number').innerText = phoneVal;
            
            const phoneScreen = document.getElementById('phone-screen');
            const otpScreen = document.getElementById('otp-screen');
            
            phoneScreen.classList.add('opacity-0', 'translate-y-4');
            setTimeout(() => {
                phoneScreen.classList.add('hidden-screen');
                otpScreen.classList.remove('hidden-screen');
                setTimeout(() => {
                    otpScreen.classList.remove('opacity-0', 'translate-y-10');
                    startTimer();
                }, 50);
            }, 300);
        }

        function navigateToPhone() {
            const phoneScreen = document.getElementById('phone-screen');
            const otpScreen = document.getElementById('otp-screen');
            
            otpScreen.classList.add('opacity-0', 'translate-y-10');
            setTimeout(() => {
                otpScreen.classList.add('hidden-screen');
                phoneScreen.classList.remove('hidden-screen');
                setTimeout(() => {
                    phoneScreen.classList.remove('opacity-0', 'translate-y-4');
                }, 50);
            }, 300);
        }

        // OTP Input Management
        const otpInputs = document.querySelectorAll('.otp-input');
        otpInputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < otpInputs.length - 1) {
                    otpInputs[index + 1].focus();
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    otpInputs[index - 1].focus();
                }
            });
        });

        // Countdown Timer Logic
        function startTimer() {
            let timeLeft = 59;
            const timerDisplay = document.getElementById('timer');
            const container = document.getElementById('timer-container');
            const resendBtn = document.getElementById('resend-btn');

            container.classList.remove('hidden');
            resendBtn.classList.add('hidden');

            const countdown = setInterval(() => {
                timeLeft--;
                const seconds = timeLeft < 10 ? `0${timeLeft}` : timeLeft;
                timerDisplay.innerText = `00:${seconds}`;

                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    container.classList.add('hidden');
                    resendBtn.classList.remove('hidden');
                }
            }, 1000);
        }

        // Micro-interaction for phone input format
        document.getElementById('phone-input').addEventListener('input', function (e) {
            this.value = this.value.replace(/[^0-9]/g, '');
        });
    </script>
