<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<title>MUNCHERZ | Burger Canvas Customizer</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&amp;family=Inter:wght@100..900&amp;family=JetBrains+Mono:wght@100..800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-tertiary": "#5b1a00",
                    "primary-container": "#d72b2b",
                    "primary": "#ffb4ac",
                    "error-container": "#93000a",
                    "surface": "#131313",
                    "surface-container-highest": "#353534",
                    "on-primary-fixed-variant": "#93000e",
                    "tertiary": "#ffb59b",
                    "on-surface": "#e5e2e1",
                    "charcoal-muted": "#2A2420",
                    "primary-fixed": "#ffdad6",
                    "inverse-on-surface": "#313030",
                    "error": "#ffb4ab",
                    "surface-bright": "#3a3939",
                    "on-secondary": "#3d2f00",
                    "inverse-primary": "#bc131b",
                    "on-background": "#e5e2e1",
                    "ember-glow": "rgba(215, 43, 43, 0.15)",
                    "secondary-container": "#e7b900",
                    "surface-container-lowest": "#0e0e0e",
                    "on-secondary-fixed": "#241a00",
                    "on-error": "#690005",
                    "paper-white": "#F5F0E8",
                    "secondary": "#ffd65b",
                    "on-tertiary-fixed": "#380d00",
                    "on-secondary-fixed-variant": "#584400",
                    "surface-variant": "#353534",
                    "on-primary-container": "#fff3f2",
                    "outline-variant": "#5c403d",
                    "tertiary-fixed-dim": "#ffb59b",
                    "surface-dim": "#131313",
                    "on-primary": "#690007",
                    "background": "#131313",
                    "on-tertiary-container": "#fff4f1",
                    "on-primary-fixed": "#410003",
                    "secondary-fixed-dim": "#f0c110",
                    "primary-fixed-dim": "#ffb4ac",
                    "on-tertiary-fixed-variant": "#7b2e0f",
                    "surface-container": "#201f1f",
                    "tertiary-fixed": "#ffdbcf",
                    "on-surface-variant": "#e5bdb9",
                    "inverse-surface": "#e5e2e1",
                    "surface-container-low": "#1c1b1b",
                    "surface-brown": "#1C1410",
                    "surface-tint": "#ffb4ac",
                    "outline": "#ac8885",
                    "on-error-container": "#ffdad6",
                    "tertiary-container": "#b15734",
                    "on-secondary-container": "#5f4a00",
                    "secondary-fixed": "#ffe08b",
                    "surface-container-high": "#2a2a2a"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "stack-md": "16px",
                    "stack-lg": "32px",
                    "margin-mobile": "20px",
                    "gutter": "16px",
                    "base": "4px",
                    "stack-sm": "8px"
            },
            "fontFamily": {
                    "display-lg": ["DM Sans"],
                    "headline-md": ["DM Sans"],
                    "section-label": ["Inter"],
                    "body-lg": ["Inter"],
                    "body-md": ["Inter"],
                    "label-sm": ["Inter"],
                    "price-tag": ["JetBrains Mono"]
            },
            "fontSize": {
                    "display-lg": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                    "section-label": ["14px", {"lineHeight": "20px", "letterSpacing": "0.1em", "fontWeight": "800"}],
                    "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                    "price-tag": ["18px", {"lineHeight": "18px", "fontWeight": "700"}]
            }
          },
        },
      }
    </script>
<style>
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(1deg); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }
        @keyframes staggerIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .stagger-item { animation: staggerIn 0.5s ease forwards; opacity: 0; }
        .canvas-smoke {
            background: radial-gradient(circle at center, transparent 30%, rgba(15, 15, 15, 0.9) 80%);
            pointer-events: none;
        }
        .grain-overlay {
            background-image: url("https://www.transparenttextures.com/patterns/carbon-fibre.png");
            opacity: 0.05;
            pointer-events: none;
        }
        .burger-layer {
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
        }
        .shake-full { animation: shake 0.2s infinite; }
        ::-webkit-scrollbar { display: none; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body-md overflow-hidden h-screen flex flex-col">
<!-- Top App Bar -->
<header class="fixed top-0 w-full z-50 border-b border-outline-variant/30 bg-surface/80 backdrop-blur-md flex items-center justify-between px-margin-mobile h-16">
<button class="p-2 active:scale-95 duration-150 text-primary">
<span class="material-symbols-outlined">menu</span>
</button>
<h1 class="font-display-lg text-[24px] text-primary-container uppercase tracking-tighter">MUNCHERZ</h1>
<button class="p-2 active:scale-95 duration-150 text-primary">
<span class="material-symbols-outlined">search</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col pt-16 relative overflow-hidden">
<!-- Live Burger Canvas (Top 60%) -->
<section class="relative h-[60%] w-full bg-surface-container-lowest flex items-center justify-center overflow-hidden">
<div class="absolute inset-0 canvas-smoke z-10"></div>
<div class="absolute inset-0 grain-overlay z-10"></div>
<!-- Dynamic Burger Stack Container -->
<div class="relative z-0 flex flex-col-reverse items-center justify-center w-full h-full pb-12" id="burger-stack">
<!-- Layers are injected here by JS -->
</div>
<!-- Atmosphere: Rising Steam/Smoke -->
<div class="absolute bottom-0 left-0 w-full h-32 bg-gradient-to-t from-surface-container-lowest to-transparent opacity-60 z-20"></div>
</section>
<!-- Ingredient Panel (Bottom 40%) -->
<section class="h-[40%] bg-surface-brown rounded-t-3xl border-t border-outline-variant/20 shadow-2xl z-30 flex flex-col p-4 relative">
<!-- Category Tabs (Horizontal Scroll) -->
<div class="flex gap-4 overflow-x-auto pb-4 mb-2 no-scrollbar px-2">
<button class="category-btn whitespace-nowrap px-6 py-2 rounded-full font-section-label text-section-label bg-primary-container text-on-primary-container shadow-lg shadow-ember-glow transition-all" onclick="switchCategory('buns')">BUNS</button>
<button class="category-btn whitespace-nowrap px-6 py-2 rounded-full font-section-label text-section-label bg-surface-container-high text-on-surface-variant hover:bg-surface-bright transition-all" onclick="switchCategory('patties')">PATTIES</button>
<button class="category-btn whitespace-nowrap px-6 py-2 rounded-full font-section-label text-section-label bg-surface-container-high text-on-surface-variant hover:bg-surface-bright transition-all" onclick="switchCategory('cheeses')">CHEESE</button>
<button class="category-btn whitespace-nowrap px-6 py-2 rounded-full font-section-label text-section-label bg-surface-container-high text-on-surface-variant hover:bg-surface-bright transition-all" onclick="switchCategory('greens')">GREENS</button>
<button class="category-btn whitespace-nowrap px-6 py-2 rounded-full font-section-label text-section-label bg-surface-container-high text-on-surface-variant hover:bg-surface-bright transition-all" onclick="switchCategory('sauces')">SAUCES</button>
</div>
<!-- Ingredients Grid -->
<div class="flex-1 overflow-y-auto pr-2 space-y-3" id="ingredient-list">
<!-- Cards injected here -->
</div>
<!-- Limit Bar -->
<div class="pt-4 pb-2 px-2">
<div class="flex justify-between items-center mb-1">
<span class="text-label-sm font-label-sm text-outline uppercase tracking-widest">Stack Capacity</span>
<span class="text-label-sm font-label-sm text-primary" id="limit-text">3 / 8</span>
</div>
<div class="h-1.5 w-full bg-surface-container rounded-full overflow-hidden">
<div class="h-full bg-primary-container transition-all duration-300" id="limit-progress" style="width: 37.5%"></div>
</div>
</div>
</section>
</main>
<!-- Footer Bar -->
<footer class="h-24 bg-surface-container border-t border-outline-variant/30 px-6 flex items-center justify-between z-50">
<div class="flex flex-col">
<span class="text-label-sm font-label-sm text-on-surface-variant uppercase">Subtotal</span>
<div class="flex items-baseline gap-1">
<span class="text-secondary font-price-tag text-[24px]">$</span>
<span class="text-secondary font-price-tag text-[32px] tracking-tight" id="price-odometer">12.50</span>
</div>
</div>
<button class="bg-primary-container text-on-primary-container font-headline-md text-headline-md px-10 py-4 rounded-xl shadow-lg shadow-ember-glow active:scale-95 transition-transform flex items-center gap-3">
<span>ADD TO CART</span>
<span class="material-symbols-outlined">shopping_cart</span>
</button>
</footer>
<script>
        const MAX_LAYERS = 8;
        let currentLayers = [
            { id: 'bun-bottom', name: 'Toasted Brioche Bottom', price: 2.00, type: 'buns', img: 'placeholder' },
            { id: 'patty-beef', name: 'Angus Beef Patty', price: 6.50, type: 'patties', img: 'placeholder' },
            { id: 'bun-top', name: 'Toasted Brioche Top', price: 1.00, type: 'buns', img: 'placeholder' }
        ];

        const ingredientData = {
            buns: [
                { id: 'bun-brioche', name: 'Toasted Brioche', price: 3.00, img: 'placeholder' },
                { id: 'bun-pretzel', name: 'Salted Pretzel', price: 4.50, img: 'placeholder' },
                { id: 'bun-lettuce', name: 'Lettuce Wrap', price: 2.00, img: 'placeholder' }
            ],
            patties: [
                { id: 'patty-beef', name: 'Angus Beef', price: 6.50, img: 'placeholder' },
                { id: 'patty-chicken', name: 'Crispy Chicken', price: 5.50, img: 'placeholder' },
                { id: 'patty-vegan', name: 'Plant-Based', price: 7.00, img: 'placeholder' }
            ],
            cheeses: [
                { id: 'cheese-cheddar', name: 'Sharp Cheddar', price: 1.50, img: 'placeholder' },
                { id: 'cheese-swiss', name: 'Swiss Cheese', price: 1.50, img: 'placeholder' },
                { id: 'cheese-pepperjack', name: 'Pepper Jack', price: 1.50, img: 'placeholder' }
            ],
            greens: [
                { id: 'extra-lettuce', name: 'Iceberg Lettuce', price: 0.50, img: 'placeholder' },
                { id: 'extra-tomato', name: 'Roma Tomato', price: 0.75, img: 'placeholder' },
                { id: 'extra-onion', name: 'Red Onion', price: 0.50, img: 'placeholder' }
            ],
            sauces: [
                { id: 'sauce-munch', name: 'Muncherz Special', price: 0.00, img: 'placeholder' },
                { id: 'sauce-bbq', name: 'Smoky BBQ', price: 0.00, img: 'placeholder' },
                { id: 'sauce-spicy', name: 'Ghost Pepper', price: 0.50, img: 'placeholder' }
            ]
        };

        const burgerStack = document.getElementById('burger-stack');
        const ingredientList = document.getElementById('ingredient-list');
        const priceDisplay = document.getElementById('price-odometer');
        const limitText = document.getElementById('limit-text');
        const limitProgress = document.getElementById('limit-progress');

        function renderStack() {
            burgerStack.innerHTML = '';
            currentLayers.forEach((layer, index) => {
                const el = document.createElement('div');
                el.className = 'burger-layer absolute w-64 h-24 flex items-center justify-center';
                // Calculate stacking offset
                const bottomOffset = index * 24;
                el.style.bottom = `${bottomOffset}px`;
                el.style.zIndex = index;
                
                // Use placeholders with custom alt prompts as per requirements
                const imgAlt = `A high-resolution, gourmet food photography shot of a ${layer.name} ingredient for a burger, featuring professional studio lighting on a dark background with realistic textures and warm highlights. The style is modern-brutalist and rustic, emphasizing the heat and freshness of the food. Vibrant colors of red and yellow are balanced against deep shadows.`;
                
                el.innerHTML = `<img src="placeholder" data-alt="${imgAlt}" class="w-full h-full object-contain transform hover:scale-105 transition-transform duration-300">`;
                
                // Add stagger delay
                el.style.animation = `staggerIn 0.3s cubic-bezier(0.17, 0.67, 0.83, 0.67) forwards`;
                el.style.animationDelay = `${index * 0.05}s`;
                
                burgerStack.appendChild(el);
            });
            updatePriceAndLimit();
        }

        function updatePriceAndLimit() {
            const total = currentLayers.reduce((sum, item) => sum + item.price, 0);
            priceDisplay.innerText = total.toFixed(2);
            
            const count = currentLayers.length;
            limitText.innerText = `${count} / ${MAX_LAYERS}`;
            const percentage = (count / MAX_LAYERS) * 100;
            limitProgress.style.width = `${percentage}%`;
            
            if(count >= MAX_LAYERS) {
                limitProgress.classList.add('bg-error');
                limitProgress.parentElement.classList.add('shake-full');
            } else {
                limitProgress.classList.remove('bg-error');
                limitProgress.parentElement.classList.remove('shake-full');
            }
        }

        function switchCategory(cat) {
            // Update UI tabs
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('bg-primary-container', 'text-on-primary-container', 'shadow-ember-glow');
                btn.classList.add('bg-surface-container-high', 'text-on-surface-variant');
            });
            event.currentTarget.classList.add('bg-primary-container', 'text-on-primary-container', 'shadow-ember-glow');
            event.currentTarget.classList.remove('bg-surface-container-high', 'text-on-surface-variant');

            // Render Ingredients
            ingredientList.innerHTML = '';
            ingredientData[cat].forEach((ing, i) => {
                const card = document.createElement('div');
                card.className = 'stagger-item flex items-center gap-4 bg-charcoal-muted p-3 rounded-xl border border-outline-variant/10 hover:border-primary/40 transition-all';
                card.style.animationDelay = `${i * 0.1}s`;
                
                const imgAlt = `Top-down studio shot of a raw ${ing.name} ingredient for custom burger assembly, vibrant colors, fresh texture, cinematic dark-mode lighting with warm red accents, high contrast, sharp details.`;
                
                card.innerHTML = `
                    <div class="w-16 h-16 bg-surface-container rounded-lg flex-shrink-0">
                        <img src="placeholder" data-alt="${imgAlt}" class="w-full h-full object-cover rounded-lg">
                    </div>
                    <div class="flex-1">
                        <h4 class="font-body-lg text-on-surface font-bold">${ing.name}</h4>
                        <p class="text-secondary font-price-tag text-label-sm">+$${ing.price.toFixed(2)}</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="removeIng('${ing.id}')" class="w-8 h-8 rounded-full border border-outline-variant flex items-center justify-center active:scale-90 transition-transform">
                            <span class="material-symbols-outlined text-sm">remove</span>
                        </button>
                        <button onclick="addIng('${ing.id}', '${ing.name}', ${ing.price}, '${cat}')" class="w-8 h-8 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center shadow-md active:scale-90 transition-transform">
                            <span class="material-symbols-outlined text-sm">add</span>
                        </button>
                    </div>
                `;
                ingredientList.appendChild(card);
            });
        }

        function addIng(id, name, price, type) {
            if(currentLayers.length >= MAX_LAYERS) {
                const bar = document.getElementById('limit-progress').parentElement;
                bar.classList.add('shake-full');
                setTimeout(() => bar.classList.remove('shake-full'), 400);
                return;
            }
            
            // Logically insert: Bottom bun (index 0), top bun (last index), others in between
            if(type === 'buns' && name.toLowerCase().includes('top')) {
                currentLayers.push({id, name, price, type});
            } else if (type === 'buns' && name.toLowerCase().includes('bottom')) {
                currentLayers.unshift({id, name, price, type});
            } else {
                // Insert before the top bun if it exists
                const topBunIdx = currentLayers.findIndex(l => l.name.toLowerCase().includes('top'));
                if(topBunIdx > -1) {
                    currentLayers.splice(topBunIdx, 0, {id, name, price, type});
                } else {
                    currentLayers.push({id, name, price, type});
                }
            }
            renderStack();
        }

        function removeIng(id) {
            const idx = currentLayers.findLastIndex(l => l.id === id);
            if(idx > -1) {
                currentLayers.splice(idx, 1);
                renderStack();
            }
        }

        // Initialize
        window.onload = () => {
            renderStack();
            switchCategory('buns');
        };
    </script>
</body></html>
